<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="none">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b5bff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b5bff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  
  <!-- Subtle Grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#222" stroke-width="0.5"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.2"/>

  <!-- Large Bar Chart (Background) -->
  <g transform="translate(100, 100)" opacity="0.1">
    <!-- Huge bars covering most of the area -->
    <rect x="0" y="200" width="80" height="300" fill="#3b5bff" rx="4"/>
    <rect x="120" y="100" width="80" height="400" fill="#3b5bff" rx="4"/>
    <rect x="240" y="250" width="80" height="250" fill="#3b5bff" rx="4"/>
    <rect x="360" y="50" width="80" height="450" fill="#3b5bff" rx="4"/>
    <rect x="480" y="150" width="80" height="350" fill="#3b5bff" rx="4"/>
  </g>

  <!-- Line Chart Overlay -->
  <g transform="translate(0, 100)" opacity="0.1">
    <polyline points="0,400 160,300 320,350 480,150 640,200 800,50" fill="none" stroke="#ffffff" stroke-width="2"/>
    <path d="M0,400 L160,300 L320,350 L480,150 L640,200 L800,50 V600 H0 Z" fill="url(#fade)"/>
  </g>

</svg>
